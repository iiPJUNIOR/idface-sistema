services:
  - type: web
    name: idface-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1
    healthCheckPath: /api/health
    envVars:
      - key: IDFACE_IP
        sync: false
      - key: IDFACE_USER
        sync: false
      - key: IDFACE_PASSWORD
        sync: false
